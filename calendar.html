<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>メニューカレンダー</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: rgba(31, 41, 55, 0.12);
      --accent: #4e79a7;
      --accent-soft: rgba(78, 121, 167, 0.12);
      --shadow: 0 18px 48px rgba(31, 41, 55, 0.12);
      --today: #f28c28;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(78, 121, 167, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(242, 140, 40, 0.16), transparent 28%),
        linear-gradient(180deg, #faf7f2 0%, var(--bg) 100%);
      min-height: 100vh;
    }
    a { color: inherit; }
    button { font: inherit; }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    h1 {
      margin: 14px 0 8px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 1.05;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .hero-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      font-weight: 700;
    }
    .meta {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .calendar-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 18px;
      margin-top: 24px;
      align-items: start;
    }
    @media (max-width: 980px) {
      .calendar-layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .calendar-panel,
      .detail-panel {
        padding: 16px;
      }
      .weekday-row,
      .calendar-grid {
        gap: 6px;
      }
      .calendar-cell {
        min-height: 68px;
        padding: 8px;
      }
    }
    .calendar-panel,
    .detail-panel {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .calendar-panel {
      padding: 20px;
    }
    .detail-panel {
      padding: 20px;
    }
    .calendar-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .calendar-toolbar__group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .calendar-toolbar button {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }
    .month-label {
      font-weight: 800;
      font-size: 1.1rem;
    }
    @media (max-width: 640px) {
      .calendar-toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .calendar-toolbar__group {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .calendar-toolbar button {
        width: 100%;
        padding: 0 10px;
      }
      .month-label {
        text-align: left;
      }
    }
    .weekday-row,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }
    .weekday-row {
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.88rem;
    }
    .weekday-row div {
      text-align: center;
      padding: 6px 0;
    }
    .calendar-grid {
      align-items: stretch;
    }
    .calendar-cell {
      min-height: 76px;
      border: 1px solid rgba(31, 41, 55, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.82);
      padding: 10px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    .calendar-cell:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.08);
    }
    .calendar-cell.is-empty {
      cursor: default;
      background: transparent;
      border-style: dashed;
      border-color: transparent;
      box-shadow: none;
    }
    .calendar-cell__day {
      font-size: 0.96rem;
      font-weight: 800;
    }
    .calendar-cell__dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: transparent;
    }
    .calendar-cell.has-data .calendar-cell__dot {
      background: var(--accent);
    }
    .calendar-cell.is-today {
      border-color: rgba(242, 140, 40, 0.65);
    }
    .calendar-cell.is-selected {
      border-color: var(--today);
      box-shadow: 0 0 0 2px rgba(242, 140, 40, 0.14) inset;
    }
    .selected-date {
      margin: 0 0 4px;
      font-size: 1.4rem;
    }
    .selected-meta {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .calendar-day-cards {
      display: grid;
      gap: 12px;
    }
    .menu-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel-strong);
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
      padding: 16px 18px;
    }
    .menu-card__header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .menu-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      padding: 6px 12px;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: #6b7280;
    }
    .meal-breakfast .menu-badge { background: #f4c542; color: #3b2f0f; }
    .meal-lunch .menu-badge { background: #f28c28; }
    .meal-dinner .menu-badge { background: #4e79a7; }
    .menu-summary {
      font-size: 1.04rem;
      font-weight: 700;
    }
    .menu-detail {
      margin: 0;
      padding-left: 20px;
      line-height: 1.7;
    }
    .menu-detail li + li {
      margin-top: 4px;
    }
    .nutrition-panel {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }
    .nutrition-panel summary {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
      list-style: none;
    }
    .nutrition-panel summary::-webkit-details-marker {
      display: none;
    }
    .nutrition-panel summary::after {
      content: "＋";
      margin-left: 8px;
      color: var(--muted);
    }
    .nutrition-panel[open] summary::after {
      content: "－";
    }
    .nutrition-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0 0;
    }
    .nutrition-item {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.66);
    }
    .nutrition-item dt {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .nutrition-item dd {
      margin: 3px 0 0;
      font-weight: 800;
    }
    .empty-state {
      margin-top: 10px;
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
    }
    .empty-state h3 {
      margin: 0 0 8px;
    }
    .empty-state p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>

  </main>

div class=\"menu-card__header\">\n          <span class=\"menu-badge\">夜<\/span>\n          <span class=\"menu-summary\">チキンカツ<\/span>\n        <\/div>\n        <ul class=\"menu-detail\"><li>(A) チキンカツ<\/li><li>ペンネナポリタン<\/li><li>ご飯<\/li><li>汁物<\/li><\/ul>\n        \n      <\/article>\n    "}}}</script>
  <script>
    const WEEKDAYS = ["月", "火", "水", "木", "金", "土", "日"];
    const DATA = JSON.parse(document.getElementById("calendar-data").textContent);
    const DAYS = DATA.days || {};

    const monthLabel = document.getElementById("month-label");
    const calendarGrid = document.getElementById("calendar-grid");
    const selectedDateLabel = document.getElementById("selected-date-label");
    const selectedDateMeta = document.getElementById("selected-date-meta");
    const selectedDayContent = document.getElementById("selected-day-content");


    function formatDateInTimeZone(date, timeZone) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(date);
      const mapped = {};
      for (const part of parts) {
        if (part.type !== "literal") {
          mapped[part.type] = part.value;
        }
      }
      return `${mapped.year}-${mapped.month}-${mapped.day}`;
    }

    function currentJstIsoDate() {
      return formatDateInTimeZone(new Date(), "Asia/Tokyo");
    }
    
    let currentBaseDate = currentJstIsoDate();
    let currentMonth = startOfMonth(currentBaseDate);
    let selectedDate = currentBaseDate;

    function parseDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(Date.UTC(year, month - 1, day));
    }

    function isoDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function startOfMonth(dateString) {
      const date = parseDate(dateString);
      return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), 1));
    }

    function formatDateLabel(dateString) {
      const date = parseDate(dateString);
      const weekday = WEEKDAYS[(date.getUTCDay() + 6) % 7];
      return `${date.getUTCMonth() + 1}/${date.getUTCDate()} (${weekday})`;
    }

    function formatMonthLabel(date) {
      return new Intl.DateTimeFormat("ja-JP", {
        year: "numeric",
        month: "long",
        timeZone: "UTC",
      }).format(date);
    }

    function shiftMonth(date, amount) {
      return new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth() + amount, 1));
    }

    function renderCalendar() {
      monthLabel.textContent = formatMonthLabel(currentMonth);
      calendarGrid.innerHTML = "";

      const firstWeekday = (currentMonth.getUTCDay() + 6) % 7;
      const daysInMonth = new Date(Date.UTC(currentMonth.getUTCFullYear(), currentMonth.getUTCMonth() + 1, 0)).getUTCDate();

      for (let index = 0; index < firstWeekday; index += 1) {
        const empty = document.createElement("div");
        empty.className = "calendar-cell is-empty";
        calendarGrid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const cellDate = new Date(Date.UTC(currentMonth.getUTCFullYear(), currentMonth.getUTCMonth(), day));
        const dateString = isoDate(cellDate);
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "calendar-cell";
        cell.innerHTML = `
          <div class="calendar-cell__day">${day}</div>
          <div class="calendar-cell__dot"></div>
        `;

        if (dateString === currentBaseDate) {
          cell.classList.add("is-today");
        }
        if (dateString === selectedDate) {
          cell.classList.add("is-selected");
        }
        if (DAYS[dateString]) {
          cell.classList.add("has-data");
        }

        cell.addEventListener("click", () => {
          selectedDate = dateString;
          currentMonth = startOfMonth(dateString);
          renderAll();
        });

        calendarGrid.appendChild(cell);
      }
    }

    function renderSelectedDay() {
      const day = DAYS[selectedDate];
      selectedDateLabel.textContent = formatDateLabel(selectedDate);
      selectedDateMeta.textContent = day
        ? `${day.count} 件のメニューがあります。`
        : "この日付にはまだメニューがありません。";

      if (!day) {
        selectedDayContent.innerHTML = `
          <section class="empty-state">
            <h3>メニューがありません</h3>
            <p>別の日付を選ぶと、その日のメニューを表示できます。</p>
          </section>
        `;
        return;
      }

      selectedDayContent.innerHTML = `
        <div class="calendar-day-cards">
          ${day.cards_html}
        </div>
      `;
    }

    function renderAll() {
      renderCalendar();
      renderSelectedDay();
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      currentMonth = shiftMonth(currentMonth, -1);
      renderCalendar();
    });
    document.getElementById("next-month").addEventListener("click", () => {
      currentMonth = shiftMonth(currentMonth, 1);
      renderCalendar();
    });
    document.getElementById("go-today").addEventListener("click", () => {
      currentBaseDate = currentJstIsoDate();
      selectedDate = currentBaseDate;
      currentMonth = startOfMonth(currentBaseDate);
      renderAll();
    });

    renderAll();
  </script>
</body>
